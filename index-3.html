<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ADUE International Schools — Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --wine: #8B0000;
      --wine-dark: #4A0000;
      --red: #C0392B;
      --white: #ffffff;
      --light: #f4f4f4;
      --border: #dddddd;
      --muted: #666666;
      --danger: #dc3545;
      --success: #28a745;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--wine) 0%, var(--wine-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--white);
      border-radius: 10px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      border-top: 5px solid var(--wine);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-icon { font-size: 50px; display: block; margin-bottom: 10px; }
    .logo h2 { font-size: 22px; font-weight: 700; color: var(--wine); }
    .logo p  { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .card-title { font-size: 15px; font-weight: 600; color: #333; text-align: center; margin-bottom: 22px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: #333; margin-bottom: 5px; }
    .req { color: var(--danger); margin-left: 2px; }
    .input-wrap { position: relative; }
    .input-wrap input { padding-right: 38px; }
    .eye-btn {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 15px; color: var(--muted);
    }
    input, select {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: 5px;
      font-family: 'Poppins', sans-serif; font-size: 13px;
      color: #333; outline: none; transition: border 0.2s;
    }
    input:focus, select:focus { border-color: var(--wine); }
    input::placeholder { color: #bbb; }
    .btn {
      width: 100%; padding: 11px;
      background: var(--wine); border: none; border-radius: 5px;
      color: var(--white); font-family: 'Poppins', sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s; margin-top: 6px;
    }
    .btn:hover { opacity: 0.88; }
    .err { font-size: 12px; color: var(--danger); text-align: center; min-height: 18px; margin-bottom: 10px; font-weight: 500; }
    .hint { text-align: center; font-size: 11px; color: #aaa; margin-top: 18px; }
    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 16px 0; }
  </style>
</head>
<body>

<!-- Setup / Login card — same container, JS swaps content -->
<div class="card" id="main-card">
  <!-- Content injected by JS -->
</div>

<script>
/* ══ KEYS ════════════════════════════════════════════════ */
const K = {
  username:  'adue_username',
  password:  'adue_password',
  adminName: 'adue_admin_name',
  school:    'adue_school_name',
  loggedIn:  'adue_logged_in',
  setupDone: 'adue_setup_done',
};

/* ══ HELPERS ════════════════════════════════════════════ */
function isSetupDone() { return localStorage.getItem(K.setupDone) === 'true'; }
function isLoggedIn()  { return localStorage.getItem(K.loggedIn)  === 'true'; }

function toggleEye(inputId, btnId) {
  const inp = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  if (inp.type === 'password') { inp.type = 'text';     btn.textContent = '🙈'; }
  else                         { inp.type = 'password'; btn.textContent = '👁';  }
}

/* ══ DO SETUP ════════════════════════════════════════════ */
function doSetup() {
  const school = document.getElementById('s-school').value.trim();
  const name   = document.getElementById('s-name').value.trim();
  const user   = document.getElementById('s-user').value.trim();
  const pass   = document.getElementById('s-pass').value;
  const pass2  = document.getElementById('s-pass2').value;
  const err    = document.getElementById('err');

  err.textContent = '';

  if (!name)        { err.textContent = 'Please enter your full name.'; return; }
  if (!user)        { err.textContent = 'Please choose a username.'; return; }
  if (user.length < 3) { err.textContent = 'Username must be at least 3 characters.'; return; }
  if (!pass)        { err.textContent = 'Please choose a password.'; return; }
  if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; return; }
  if (pass !== pass2)  { err.textContent = 'Passwords do not match.'; return; }

  localStorage.setItem(K.username,  user);
  localStorage.setItem(K.password,  pass);
  localStorage.setItem(K.adminName, name);
  localStorage.setItem(K.setupDone, 'true');
  if (school) localStorage.setItem(K.school, school);

  // Auto-login after setup
  localStorage.setItem(K.loggedIn, 'true');
  window.location.href = 'dashboard.html';
}

/* ══ DO LOGIN ════════════════════════════════════════════ */
function doLogin() {
  const user  = document.getElementById('l-user').value.trim();
  const pass  = document.getElementById('l-pass').value;
  const err   = document.getElementById('err');
  const btn   = document.getElementById('login-btn');

  err.textContent = '';

  if (!user || !pass) { err.textContent = 'Please enter your username and password.'; return; }

  const savedUser = localStorage.getItem(K.username) || '';
  const savedPass = localStorage.getItem(K.password) || '';

  if (user === savedUser && pass === savedPass) {
    btn.textContent = 'Signing in…';
    btn.disabled = true;
    localStorage.setItem(K.loggedIn, 'true');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
  } else {
    err.textContent = 'Incorrect username or password. Please try again.';
    document.getElementById('l-pass').value = '';
    document.getElementById('l-pass').focus();
  }
}

/* ══ ENTER KEY ════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (!isSetupDone()) doSetup();
  else doLogin();
});

/* ══ INIT ════════════════════════════════════════════════ */
if (isLoggedIn() && isSetupDone()) {
  window.location.href = 'dashboard.html';
} else if (isSetupDone()) {
  showLogin();
} else {
  showSetup();
}
