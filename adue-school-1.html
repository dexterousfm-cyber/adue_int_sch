<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ADUE International Schools</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --wine:    #5C0A20;
    --wine2:   #7A0F2B;
    --wine3:   #9B1535;
    --red:     #C0392B;
    --red2:    #E74C3C;
    --gold:    #D4AF37;
    --gold2:   #F0C040;
    --cream:   #FDF6EC;
    --cream2:  #F5EBD8;
    --text:    #1A0A0F;
    --muted:   #7A5060;
    --white:   #FFFFFF;
    --shadow:  0 4px 24px rgba(92,10,32,0.18);
    --shadow2: 0 8px 40px rgba(92,10,32,0.28);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--wine) 0%, var(--wine2) 40%, var(--red) 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  #login-screen::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 30%, rgba(212,175,55,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(255,255,255,0.06) 0%, transparent 50%);
  }
  .login-card {
    background: rgba(253,246,236,0.97);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%; max-width: 420px;
    box-shadow: var(--shadow2);
    position: relative; z-index: 1;
    border-top: 5px solid var(--gold);
    animation: fadeUp 0.5s ease;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:none; } }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .school-icon { font-size: 48px; margin-bottom: 10px; display: block; }
  .login-logo h1 { font-family:'Cormorant Garamond',serif; font-size: 34px; color: var(--wine); letter-spacing: 2px; }
  .login-logo p  { font-size: 11px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
  .login-card label { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
  .login-card input { width: 100%; padding: 12px 16px; border: 1.5px solid #e2c9d0; border-radius: 9px; font-family: 'Outfit',sans-serif; font-size: 14px; background: #fff; color: var(--text); outline: none; transition: border 0.2s; margin-bottom: 18px; }
  .login-card input:focus { border-color: var(--wine3); }
  .btn-login { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--wine), var(--red)); border: none; border-radius: 9px; color: #fff; font-family: 'Outfit',sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; letter-spacing: 1px; transition: opacity 0.2s; }
  .btn-login:hover { opacity: 0.88; }
  .login-hint { text-align: center; font-size: 12px; color: var(--muted); margin-top: 16px; }
  .login-hint strong { color: var(--wine); }
  #login-err { color: var(--red); font-size: 13px; text-align: center; margin-bottom: 12px; min-height: 18px; }

  /* ── LAYOUT ── */
  #app { display: none; }
  .layout { display: flex; min-height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 230px; min-height: 100vh;
    background: linear-gradient(180deg, var(--wine) 0%, var(--wine2) 60%, #3d0615 100%);
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0;
    box-shadow: 4px 0 20px rgba(92,10,32,0.25);
    z-index: 100;
  }
  .sidebar-brand { padding: 28px 22px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-brand h2 { font-family:'Cormorant Garamond',serif; font-size: 22px; color: var(--gold); letter-spacing: 2px; }
  .sidebar-brand p  { font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 3px; }
  .sidebar nav { flex: 1; padding: 16px 10px; overflow-y: auto; }
  .nav-item {
    display: flex; align-items: center; gap: 11px;
    width: 100%; padding: 11px 14px; border-radius: 10px;
    border: none; background: transparent; cursor: pointer;
    color: rgba(255,255,255,0.6); font-family: 'Outfit',sans-serif;
    font-size: 13px; font-weight: 400; text-align: left;
    margin-bottom: 2px; transition: all 0.18s;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-item.active { background: rgba(212,175,55,0.18); color: var(--gold2); font-weight: 600; border-left-color: var(--gold); }
  .nav-item .nav-icon { font-size: 17px; }
  .sidebar-footer { padding: 16px 18px; border-top: 1px solid rgba(255,255,255,0.1); }
  .sidebar-footer .user-name { color: #fff; font-weight: 500; font-size: 13px; }
  .sidebar-footer .user-sub  { color: rgba(255,255,255,0.4); font-size: 11px; margin-bottom: 10px; }
  .btn-signout { width: 100%; padding: 8px; background: rgba(231,76,60,0.2); border: 1px solid rgba(231,76,60,0.4); border-radius: 7px; color: #ff8a7a; font-family:'Outfit',sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-signout:hover { background: rgba(231,76,60,0.35); }

  /* ── MAIN ── */
  .main { margin-left: 230px; padding: 36px 32px; flex: 1; min-height: 100vh; }

  /* ── PAGE HEADER ── */
  .page-header { margin-bottom: 26px; }
  .page-header h2 { font-family:'Cormorant Garamond',serif; font-size: 30px; color: var(--wine); }
  .page-header p  { color: var(--muted); font-size: 13px; margin-top: 4px; }

  /* ── STAT CARDS ── */
  .stats-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 26px; }
  .stat-card {
    flex: 1; min-width: 140px;
    background: #fff; border-radius: 14px;
    padding: 20px 22px;
    border-top: 3px solid var(--wine3);
    box-shadow: 0 2px 12px rgba(92,10,32,0.08);
    transition: transform 0.18s;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-card .stat-icon { font-size: 24px; margin-bottom: 8px; }
  .stat-card .stat-val  { font-family:'Cormorant Garamond',serif; font-size: 28px; color: var(--wine); font-weight: 700; }
  .stat-card .stat-lbl  { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .stat-card.green { border-top-color: #27AE60; } .stat-card.green .stat-val { color: #1e8449; }
  .stat-card.red   { border-top-color: var(--red); } .stat-card.red .stat-val { color: var(--red); }
  .stat-card.gold  { border-top-color: var(--gold); } .stat-card.gold .stat-val { color: #8a6a00; }

  /* ── CARD BOX ── */
  .card { background: #fff; border-radius: 14px; box-shadow: 0 2px 14px rgba(92,10,32,0.07); overflow: hidden; }
  .card-body { padding: 24px; }
  .card-title { font-family:'Cormorant Garamond',serif; font-size: 19px; color: var(--wine); margin-bottom: 16px; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  thead tr { background: var(--cream2); }
  th { padding: 12px 15px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--wine); font-weight: 600; border-bottom: 2px solid var(--cream2); white-space: nowrap; }
  td { padding: 12px 15px; border-bottom: 1px solid #f2e6ea; color: var(--text); vertical-align: middle; }
  tbody tr:hover { background: #fdf0f3; }
  .muted { color: var(--muted); font-size: 12px; }

  /* ── PILL ── */
  .pill { display: inline-block; padding: 3px 11px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .pill-green  { background: #d4edda; color: #1e6635; }
  .pill-red    { background: #fde8e8; color: #922b21; }
  .pill-yellow { background: #fef9e7; color: #7d6608; }
  .pill-blue   { background: #d6eaf8; color: #1a5276; }
  .pill-gray   { background: #f0edf0; color: #555; }

  /* ── BUTTONS ── */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-family:'Outfit',sans-serif; font-weight: 600; font-size: 13px; transition: all 0.18s; }
  .btn-primary { background: linear-gradient(135deg, var(--wine), var(--wine3)); color: #fff; }
  .btn-primary:hover { opacity: 0.88; }
  .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--wine); }
  .btn-gold:hover { opacity: 0.88; }
  .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 6px; }
  .btn-danger { background: #fde8e8; color: #922b21; border: 1px solid #f5c6c6; }
  .btn-danger:hover { background: #f5c6c6; }
  .btn-edit { background: #eae0f0; color: var(--wine); border: 1px solid #d4c0dc; }
  .btn-edit:hover { background: #d4c0dc; }

  /* ── TOOLBAR ── */
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .search-box { padding: 9px 14px; border: 1.5px solid #e2c9d0; border-radius: 8px; font-family:'Outfit',sans-serif; font-size: 13px; color: var(--text); outline: none; width: 200px; background: #fff; transition: border 0.2s; }
  .search-box:focus { border-color: var(--wine3); }
  .filter-select { padding: 9px 13px; border: 1.5px solid #e2c9d0; border-radius: 8px; font-family:'Outfit',sans-serif; font-size: 13px; color: var(--text); background: #fff; outline: none; }

  /* ── MODAL ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(92,10,32,0.55); z-index: 500; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--cream); border-radius: 16px; padding: 32px; width: 100%; max-width: 500px; box-shadow: var(--shadow2); max-height: 90vh; overflow-y: auto; animation: fadeUp 0.25s ease; border-top: 4px solid var(--gold); position: relative; }
  .modal-box.wide { max-width: 660px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .modal-header h3 { font-family:'Cormorant Garamond',serif; font-size: 22px; color: var(--wine); }
  .modal-close { background: none; border: none; font-size: 22px; color: var(--muted); cursor: pointer; padding: 2px 6px; border-radius: 6px; }
  .modal-close:hover { background: #f2e6ea; }
  .form-group { margin-bottom: 15px; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 1.2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 13px; border: 1.5px solid #e2c9d0; border-radius: 8px; font-family:'Outfit',sans-serif; font-size: 13px; color: var(--text); background: #fff; outline: none; transition: border 0.2s; }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--wine3); }
  .form-group textarea { resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-actions { margin-top: 20px; display: flex; gap: 10px; }

  /* ── SCORE BAR ── */
  .score-bar { display: flex; align-items: center; gap: 8px; }
  .bar-track { width: 60px; height: 6px; background: #f0e0e4; border-radius: 3px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 3px; }

  /* ── REPORT CARD ── */
  .report-select-row { display: flex; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
  .report-card-box { background: #fff; border-radius: 16px; padding: 30px; max-width: 620px; box-shadow: var(--shadow); }
  .report-header { text-align: center; border-bottom: 2px solid var(--cream2); padding-bottom: 18px; margin-bottom: 22px; }
  .report-header h3 { font-family:'Cormorant Garamond',serif; font-size: 24px; color: var(--wine); }
  .report-header p  { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
  .report-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: var(--cream2); border-radius: 10px; padding: 14px; margin-bottom: 20px; font-size: 13px; }
  .report-info span.lbl { color: var(--muted); }
  .report-info span.val { color: var(--wine); font-weight: 600; }
  .report-summary { background: var(--cream2); border-radius: 10px; padding: 14px; display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }

  /* ── ATTENDANCE BTNS ── */
  .att-btns { display: flex; gap: 6px; }
  .att-btn { padding: 4px 10px; border-radius: 6px; border: 1px solid #e0c8cc; background: transparent; cursor: pointer; font-family:'Outfit',sans-serif; font-size: 11px; font-weight: 600; color: var(--muted); transition: all 0.15s; }
  .att-btn.active-present { background: #d4edda; color: #1e6635; border-color: #a8d5b5; }
  .att-btn.active-absent  { background: #fde8e8; color: #922b21; border-color: #f5c6c6; }
  .att-btn.active-late    { background: #fef9e7; color: #7d6608; border-color: #f5e5a0; }

  /* ── NOTICE CARD ── */
  .notice-card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 12px; box-shadow: 0 2px 10px rgba(92,10,32,0.06); border-left: 4px solid var(--wine3); }
  .notice-card.high   { border-left-color: var(--red); }
  .notice-card.medium { border-left-color: var(--gold); }
  .notice-card.low    { border-left-color: #3498db; }
  .notice-title { font-family:'Cormorant Garamond',serif; font-size: 18px; color: var(--wine); font-weight: 600; }
  .notice-meta  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .notice-body  { font-size: 13px; color: #4a2a35; margin-top: 10px; line-height: 1.6; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-state .empty-icon { font-size: 44px; margin-bottom: 12px; }

  /* ── TOAST ── */
  #toast { position: fixed; bottom: 28px; right: 28px; background: var(--wine); color: #fff; padding: 13px 22px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: var(--shadow); z-index: 9999; display: none; animation: fadeUp 0.3s ease; border-left: 4px solid var(--gold); }

  /* ── GRADE BADGE ── */
  .grade-badge { display: inline-block; padding: 3px 11px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .g-A { background: #d4edda; color: #1e6635; }
  .g-B { background: #d6eaf8; color: #1a5276; }
  .g-C { background: #fef9e7; color: #7d6608; }
  .g-D { background: #fde8e8; color: #922b21; }
  .g-F { background: #f0edf0; color: #555; }

  /* ── DASHBOARD GRID ── */
  .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .dash-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f2e6ea; }
  .dash-list-item:last-child { border-bottom: none; }

  @media (max-width: 900px) {
    .sidebar { width: 195px; }
    .main { margin-left: 195px; padding: 24px 18px; }
    .dash-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ══ LOGIN ══════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span class="school-icon">🏫</span>
      <h1>ADUE</h1>
      <p>International Schools · Portal</p>
    </div>
    <div id="login-err"></div>
    <div class="form-group"><label>Username</label><input id="l-user" type="text" placeholder="Enter username"/></div>
    <div class="form-group"><label>Password</label><input id="l-pass" type="password" placeholder="Enter password"/></div>
    <button class="btn-login" onclick="doLogin()">Sign In</button>
    <p class="login-hint">Demo: <strong>admin</strong> / <strong>adue2025</strong></p>
  </div>
</div>

<!-- ══ APP ════════════════════════════════════════════════ -->
<div id="app">
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>ADUE</h2>
        <p>International Schools</p>
      </div>
      <nav>
        <button class="nav-item active" onclick="go('dashboard')"   id="nav-dashboard">  <span class="nav-icon">🏠</span> Dashboard</button>
        <button class="nav-item"        onclick="go('students')"    id="nav-students">   <span class="nav-icon">🎓</span> Students</button>
        <button class="nav-item"        onclick="go('teachers')"    id="nav-teachers">   <span class="nav-icon">👨‍🏫</span> Staff</button>
        <button class="nav-item"        onclick="go('grades')"      id="nav-grades">     <span class="nav-icon">📊</span> Grades</button>
        <button class="nav-item"        onclick="go('attendance')"  id="nav-attendance"> <span class="nav-icon">📋</span> Attendance</button>
        <button class="nav-item"        onclick="go('fees')"        id="nav-fees">       <span class="nav-icon">💰</span> Fees</button>
        <button class="nav-item"        onclick="go('reportcard')"  id="nav-reportcard"> <span class="nav-icon">📄</span> Report Cards</button>
        <button class="nav-item"        onclick="go('notices')"     id="nav-notices">    <span class="nav-icon">📢</span> Notices</button>
      </nav>
      <div class="sidebar-footer">
        <div class="user-name">Admin User</div>
        <div class="user-sub">Session 2024/2025</div>
        <button class="btn-signout" onclick="doLogout()">Sign Out</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <div id="page-dashboard"></div>
      <div id="page-students"   style="display:none"></div>
      <div id="page-teachers"   style="display:none"></div>
      <div id="page-grades"     style="display:none"></div>
      <div id="page-attendance" style="display:none"></div>
      <div id="page-fees"       style="display:none"></div>
      <div id="page-reportcard" style="display:none"></div>
      <div id="page-notices"    style="display:none"></div>
    </main>
  </div>
</div>

<!-- ══ MODAL ═══════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ══ TOAST ════════════════════════════════════════════════ -->

function load(key, seed) {
  try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : seed; }
  catch(e) { return seed; }
}
function save(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}

/* ═══════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════ */
function uid() { return Date.now() + Math.random(); }
function naira(n) { return '₦' + Number(n).toLocaleString(); }
function scoreToGrade(s) { return s>=80?'A':s>=65?'B':s>=50?'C':s>=40?'D':'F'; }
function gradeClass(g) { return 'g-'+g; }
function feeStatus(f) { return f.paid>=f.amount?'Paid':f.paid>0?'Partial':'Unpaid'; }
function pillClass(s) {
  const m = { Active:'pill-green', Inactive:'pill-red', 'On Leave':'pill-yellow',
    Present:'pill-green', Absent:'pill-red', Late:'pill-yellow',
    Paid:'pill-green', Partial:'pill-yellow', Unpaid:'pill-red',
    High:'pill-red', Medium:'pill-yellow', Low:'pill-blue' };
  return 'pill ' + (m[s]||'pill-gray');
}
function remark(s) { return s>=80?'Excellent':s>=65?'Good':s>=50?'Average':s>=40?'Below Average':'Poor'; }
function scoreBarColor(g) { return g==='A'?'#27AE60':g==='B'?'#2980b9':g==='C'?'#d4ac0d':g==='D'?'#e67e22':'#c0392b'; }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(()=>{ t.style.display='none'; }, 2800);
}

function classOptions() {
  return ['JSS 1A','JSS 1B','JSS 2A','JSS 2B','JSS 3A','JSS 3B','SSS 1A','SSS 1B','SSS 2A','SSS 2B','SSS 3A','SSS 3B'];
}
function subjectOptions() {
  return ['Mathematics','English Language','Sciences','Social Studies','ICT','French','Fine Arts','Physical Education'];
}

let currentPage = 'dashboard';
function go(page) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+page).classList.add('active');
  document.querySelectorAll('.main > div').forEach(d=>d.style.display='none');
  document.getElementById('page-'+page).style.display='';
  currentPage = page;
  const renders = { dashboard, students, teachers, grades, attendance, fees, reportcard, notices };
  renders[page]();
}

function doLogin() {
  const u = document.getElementById('l-user').value.trim();
  const p = document.getElementById('l-pass').value;
  if (u==='admin' && p==='adue2025') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    go('dashboard');
  } else {
    document.getElementById('login-err').textContent = 'Invalid username or password.';
  }
}
function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-err').textContent = '';
  document.getElementById('l-user').value = '';
  document.getElementById('l-pass').value = '';
}

  openModal('Edit Student', `

function saveStudent(editing=false) {
  const name = document.getElementById('sf-name').value.trim();
  const admNo = document.getElementById('sf-adm').value.trim();
  if (!name||!admNo) { toast('Please fill in name and admission number.'); return; }
  const obj = { name, admNo, cls: document.getElementById('sf-cls').value, gender: document.getElementById('sf-gender').value, age: Number(document.getElementById('sf-age').value)||0, status: document.getElementById('sf-status').value };
  if (editing) {
    const id = Number(document.getElementById('sf-edit-id').value);
    DB.students = DB.students.map(s=>s.id===id?{...s,...obj}:s);
    toast('Student updated!');
  } else {
    DB.students.push({...obj, id: uid()});
    toast('Student registered successfully!');
  }
  persist('students'); closeModal(); students();
}

function deleteStudent(id) {
  if (!confirm('Delete this student?')) return;
  DB.students = DB.students.filter(s=>s.id!==id);
  persist('students'); toast('Student deleted.'); students();
}

  const admNo=document.getElementById('gf-stu').value;
  const score=Number(document.getElementById('gf-score').value);
  if(!admNo||!score){toast('Student and score required.');return;}
  const stu=DB.students.find(s=>s.admNo===admNo);
  const grade=scoreToGrade(score);
  DB.grades.push({id:uid(),student:stu?.name||admNo,admNo,subject:document.getElementById('gf-sub').value,score,grade,term:document.getElementById('gf-term').value,session:document.getElementById('gf-ses').value});
  persist('grades');closeModal();toast('Grade saved!');grades();
}

/* ═══════════════════════════════════════════════════════════
   ATTENDANCE
═══════════════════════════════════════════════════════════ */
let attDate = new Date().toISOString().split('T')[0];
function attendance(q='') {
  const el = document.getElementById('page-attendance');
  const todayRec = DB.attendance.filter(a=>a.date===attDate);
  const getStatus = admNo => todayRec.find(a=>a.admNo===admNo)?.status||null;
  const list = DB.students.filter(s=>!q||s.name.toLowerCase().includes(q.toLowerCase()));
  const P=todayRec.filter(a=>a.status==='Present').length, A=todayRec.filter(a=>a.status==='Absent').length, L=todayRec.filter(a=>a.status==='Late').length;
  const marked=new Set(todayRec.map(r=>r.admNo));

  el.innerHTML = `
    <div class="page-header"><h2>Attendance</h2><p>Daily attendance register</p></div>
    <div class="toolbar">
      <input class="search-box" placeholder="Search student…" oninput="attendance(this.value)" value="${q}"/>
      <input type="date" class="filter-select" value="${attDate}" onchange="attDate=this.value;attendance('${q}')"/>
    </div>
    <div class="stats-row">
      <div class="stat-card green"><div class="stat-icon">✅</div><div class="stat-val">${P}</div><div class="stat-lbl">Present</div></div>
      <div class="stat-card red"><div class="stat-icon">❌</div><div class="stat-val">${A}</div><div class="stat-lbl">Absent</div></div>
      <div class="stat-card gold"><div class="stat-icon">⏰</div><div class="stat-val">${L}</div><div class="stat-lbl">Late</div></div>
      <div class="stat-card"><div class="stat-icon">❓</div><div class="stat-val">${DB.students.length-marked.size}</div><div class="stat-lbl">Unmarked</div></div>
    </div>
    <div class="card table-wrap">
      <table>
        <thead><tr><th>Student</th><th>Adm. No.</th><th>Class</th><th>Status</th><th>Mark</th></tr></thead>
        <tbody>
          ${list.map(s=>{
            const st=getStatus(s.admNo);
            return `<tr>
              <td><strong>${s.name}</strong></td>
              <td class="muted">${s.admNo}</td>
              <td>${s.cls}</td>
              <td>${st?`<span class="${pillClass(st)}">${st}</span>`:'<span class="muted">—</span>'}</td>
              <td><div class="att-btns">
                <button class="att-btn${st==='Present'?' active-present':''}" onclick="markAtt('${s.admNo}','${s.name}','Present')">Present</button>
                <button class="att-btn${st==='Absent'?' active-absent':''}"  onclick="markAtt('${s.admNo}','${s.name}','Absent')">Absent</button>
                <button class="att-btn${st==='Late'?' active-late':''}"      onclick="markAtt('${s.admNo}','${s.name}','Late')">Late</button>
              </div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

function markAtt(admNo,name,status) {
  DB.attendance = DB.attendance.filter(a=>!(a.date===attDate&&a.admNo===admNo));
  DB.attendance.push({id:uid(),student:name,admNo,date:attDate,status});
  persist('attendance');attendance();
}

/* ═══════════════════════════════════════════════════════════
   FEES
═══════════════════════════════════════════════════════════ */
function fees(q='') {
  const el = document.getElementById('page-fees');
  const list = DB.fees.filter(f=>!q||f.student.toLowerCase().includes(q.toLowerCase())||f.admNo.includes(q));
  const billed=DB.fees.reduce((a,b)=>a+b.amount,0), paid=DB.fees.reduce((a,b)=>a+b.paid,0);
  el.innerHTML = `
    <div class="page-header"><h2>Fee Management</h2><p>Track school fee payments</p></div>
    <div class="toolbar">
      <input class="search-box" placeholder="Search student…" oninput="fees(this.value)" value="${q}"/>
      <button class="btn btn-gold" onclick="openAddFee()">+ Add Record</button>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-icon">📄</div><div class="stat-val">${naira(billed)}</div><div class="stat-lbl">Total Billed</div></div>
      <div class="stat-card green"><div class="stat-icon">💰</div><div class="stat-val">${naira(paid)}</div><div class="stat-lbl">Collected</div></div>
      <div class="stat-card red"><div class="stat-icon">⚠️</div><div class="stat-val">${naira(billed-paid)}</div><div class="stat-lbl">Outstanding</div></div>
    </div>
    <div class="card table-wrap">
      <table>
        <thead><tr><th>Student</th><th>Adm. No.</th><th>Term</th><th>Amount</th><th>Paid</th><th>Balance</th><th>Status</th><th>Action</th></tr></thead>
        <tbody>
          ${list.length===0?`<tr><td colspan="8"><div class="empty-state"><div class="empty-icon">💰</div>No records.</div></td></tr>`
            :list.map(f=>`<tr>
              <td><strong>${f.student}</strong></td>
              <td class="muted">${f.admNo}</td>
              <td>${f.term}</td>
              <td>${naira(f.amount)}</td>
              <td style="color:#1e6635">${naira(f.paid)}</td>
              <td style="color:${f.amount-f.paid>0?'#922b21':'#1e6635'}">${naira(f.amount-f.paid)}</td>
              <td><span class="${pillClass(feeStatus(f))}">${feeStatus(f)}</span></td>
              <td><button class="btn btn-sm btn-edit" onclick="openEditFee(${f.id})">Edit</button></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function feeForm(f){
  return `
    <div class="form-row">
      <div class="form-group"><label>Student</label><select id="ff-stu">${DB.students.map(s=>`<option value="${s.admNo}"${f&&f.admNo===s.admNo?' selected':''}>${s.name}</option>`).join('')}</select></div>
      <div class="form-group"><label>Term</label><select id="ff-term"><option${f&&f.term==='Term 1'?' selected':''}>Term 1</option><option${f&&f.term==='Term 2'?' selected':''}>Term 2</option><option${f&&f.term==='Term 3'?' selected':''}>Term 3</option></select></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Amount (₦)</label><input id="ff-amt" type="number" value="${f?f.amount:150000}"/></div>
      <div class="form-group"><label>Amount Paid (₦)</label><input id="ff-paid" type="number" value="${f?f.paid:0}"/></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Session</label><input id="ff-ses" value="${f?f.session:'2024/2025'}"/></div>
      <div class="form-group"><label>Payment Date</label><input id="ff-date" type="date" value="${f&&f.date!=='—'?f.date:''}"/></div>
    </div>`;
}

function openAddFee(){openModal('Add Fee Record',feeForm(null)+`<input type="hidden" id="ff-eid" value=""/><div class="form-actions"><button class="btn btn-gold" onclick="saveFee()">Add Record</button><button class="btn" style="background:#f2e6ea;color:var(--wine)" onclick="closeModal()">Cancel</button></div>`);}
function openEditFee(id){const f=DB.fees.find(x=>x.id===id);if(!f)return;openModal('Edit Fee Record',feeForm(f)+`<input type="hidden" id="ff-eid" value="${id}"/><div class="form-actions"><button class="btn btn-gold" onclick="saveFee(true)">Save Changes</button><button class="btn" style="background:#f2e6ea;color:var(--wine)" onclick="closeModal()">Cancel</button></div>`);}

function saveFee(editing=false){
  const admNo=document.getElementById('ff-stu').value;
  const stu=DB.students.find(s=>s.admNo===admNo);
  const obj={student:stu?.name||admNo,admNo,term:document.getElementById('ff-term').value,amount:Number(document.getElementById('ff-amt').value),paid:Number(document.getElementById('ff-paid').value),session:document.getElementById('ff-ses').value,date:document.getElementById('ff-date').value||'—'};
  if(editing){const id=Number(document.getElementById('ff-eid').value);DB.fees=DB.fees.map(f=>f.id===id?{...f,...obj}:f);toast('Fee record updated!');}
  else{DB.fees.push({...obj,id:uid()});toast('Fee record added!');}
  persist('fees');closeModal();fees();
}

/* ═══════════════════════════════════════════════════════════
   REPORT CARD
═══════════════════════════════════════════════════════════ */
let rcStudent='', rcTerm='Term 1';
function reportcard(){
  const el=document.getElementById('page-reportcard');
  const sg=DB.grades.filter(g=>g.student===rcStudent&&g.term===rcTerm);
  const avg=sg.length?Math.round(sg.reduce((a,b)=>a+b.score,0)/sg.length):null;
  const stu=DB.students.find(s=>s.name===rcStudent);
  el.innerHTML=`
    <div class="page-header"><h2>Report Cards</h2><p>Generate individual student result slips</p></div>
    <div class="report-select-row">
      <select class="filter-select" style="min-width:220px" onchange="rcStudent=this.value;reportcard()">
        <option value="">— Select Student —</option>
        ${DB.students.map(s=>`<option value="${s.name}"${rcStudent===s.name?' selected':''}>${s.name}</option>`).join('')}
      </select>
      <select class="filter-select" onchange="rcTerm=this.value;reportcard()">
        <option${rcTerm==='Term 1'?' selected':''}>Term 1</option>
        <option${rcTerm==='Term 2'?' selected':''}>Term 2</option>
        <option${rcTerm==='Term 3'?' selected':''}>Term 3</option>
      </select>
    </div>
    ${!rcStudent?`<div class="card" style="padding:48px;text-align:center;color:var(--muted)"><div style="font-size:48px;margin-bottom:12px">📋</div>Select a student and term to generate their report card.</div>`:
    `<div class="report-card-box">
      <div class="report-header">
        <h3>ADUE International Schools</h3>
        <p>Student Result Slip — ${rcTerm} · Session 2024/2025</p>
      </div>
      <div class="report-info">
        <div><span class="lbl">Name: </span><span class="val">${stu?.name||rcStudent}</span></div>
        <div><span class="lbl">Adm. No.: </span><span class="val">${stu?.admNo||'—'}</span></div>
        <div><span class="lbl">Class: </span><span class="val">${stu?.cls||'—'}</span></div>
        <div><span class="lbl">Term: </span><span class="val">${rcTerm}</span></div>
      </div>
      ${sg.length===0?`<div class="empty-state"><div class="empty-icon">📊</div>No grades for this term.</div>`:`
        <div class="table-wrap">
          <table>
            <thead><tr><th>Subject</th><th>Score</th><th>Grade</th><th>Remark</th></tr></thead>
            <tbody>
              ${sg.map(g=>`<tr>
                <td><strong>${g.subject}</strong></td>
                <td>${g.score}</td>
                <td><span class="grade-badge ${gradeClass(g.grade)}">${g.grade}</span></td>
                <td class="muted">${remark(g.score)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
        <div class="report-summary">
          <div style="font-size:14px;color:var(--muted)">Overall Average: <strong style="font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--wine)">${avg}%</strong></div>
          <div style="font-size:14px;color:var(--muted)">Grade: <span class="grade-badge ${gradeClass(scoreToGrade(avg))}" style="font-size:16px">${scoreToGrade(avg)}</span></div>
        </div>`}
    </div>`}`;
}

/* ═══════════════════════════════════════════════════════════
   NOTICES
═══════════════════════════════════════════════════════════ */
function notices(){
  const el=document.getElementById('page-notices');
  el.innerHTML=`
    <div class="page-header"><h2>Announcements</h2><p>${DB.notices.length} notices posted</p></div>
    <div class="toolbar">
      <div></div>
      <button class="btn btn-primary" onclick="openAddNotice()">+ New Notice</button>
    </div>
    <div>
      ${[...DB.notices].reverse().map(n=>`
        <div class="notice-card ${n.priority.toLowerCase()}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:6px">
            <div>
              <div class="notice-title">${n.title}</div>
              <div class="notice-meta">By ${n.author} · ${n.date}</div>
            </div>
            <div style="display:flex;gap:6px;align-items:center">
              <span class="${pillClass(n.priority)}">${n.priority}</span>
              <button class="btn btn-sm btn-edit" onclick="openEditNotice(${n.id})">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deleteNotice(${n.id})">Del</button>
            </div>
          </div>
          <p class="notice-body">${n.body}</p>
        </div>`).join('')}
    </div>`;
}

function noticeForm(n){
  return `
    <div class="form-group"><label>Title</label><input id="nf-title" value="${n?n.title:''}" placeholder="Notice title"/></div>
    <div class="form-group"><label>Body</label><textarea id="nf-body" rows="4" placeholder="Write the notice here…">${n?n.body:''}</textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Priority</label><select id="nf-prio"><option${n&&n.priority==='High'?' selected':''}>High</option><option${!n||n.priority==='Medium'?' selected':''}>Medium</option><option${n&&n.priority==='Low'?' selected':''}>Low</option></select></div>
      <div class="form-group"><label>Date</label><input id="nf-date" type="date" value="${n?n.date:new Date().toISOString().split('T')[0]}"/></div>
    </div>
    <div class="form-group"><label>Author</label><input id="nf-auth" value="${n?n.author:'Admin'}"/></div>`;
}

function openAddNotice(){openModal('New Announcement',noticeForm(null)+`<input type="hidden" id="nf-eid" value=""/><div class="form-actions"><button class="btn btn-primary" onclick="saveNotice()">Post Notice</button><button class="btn" style="background:#f2e6ea;color:var(--wine)" onclick="closeModal()">Cancel</button></div>`,true);}
function openEditNotice(id){const n=DB.notices.find(x=>x.id===id);if(!n)return;openModal('Edit Notice',noticeForm(n)+`<input type="hidden" id="nf-eid" value="${id}"/><div class="form-actions"><button class="btn btn-primary" onclick="saveNotice(true)">Save Changes</button><button class="btn" style="background:#f2e6ea;color:var(--wine)" onclick="closeModal()">Cancel</button></div>`,true);}

function saveNotice(editing=false){
  const title=document.getElementById('nf-title').value.trim(),body=document.getElementById('nf-body').value.trim();
  if(!title||!body){toast('Title and body required.');return;}
  const obj={title,body,priority:document.getElementById('nf-prio').value,date:document.getElementById('nf-date').value,author:document.getElementById('nf-auth').value};
  if(editing){const id=Number(document.getElementById('nf-eid').value);DB.notices=DB.notices.map(n=>n.id===id?{...n,...obj}:n);toast('Notice updated!');}
  else{DB.notices.push({...obj,id:uid()});toast('Notice posted!');}
  persist('notices');closeModal();notices();
}
function deleteNotice(id){if(!confirm('Delete this notice?'))return;DB.notices=DB.notices.filter(n=>n.id!==id);persist('notices');toast('Notice deleted.');notices();}
</script>
</body>
</html>
